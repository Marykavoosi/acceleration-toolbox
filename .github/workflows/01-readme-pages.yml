name: Build Docs Site

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build README site
        run: |
          mkdir -p 01_GitHub/site
          cp 01_GitHub/README.md 01_GitHub/site/index.md

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: 01_GitHub/site
